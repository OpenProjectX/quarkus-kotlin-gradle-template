<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ cookiecutter.project_name }} — Web UI</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #0b1020; color: #e6e9f0; }
      .container { max-width: 640px; margin: 4rem auto; padding: 2rem; }
      h1 { margin: 0 0 .5rem; }
      p { line-height: 1.5; color: #b9c0d4; }
      code { background: #1b2440; padding: .1rem .35rem; border-radius: .25rem; }
      .row { display: flex; gap: .5rem; margin: 1.5rem 0; }
      input { flex: 1; padding: .6rem .8rem; border-radius: .5rem; border: 1px solid #2a355c; background: #121a33; color: #e6e9f0; }
      button { padding: .6rem 1rem; border-radius: .5rem; border: 0; background: #4f7cff; color: white; cursor: pointer; }
      button:disabled { opacity: .6; cursor: default; }
      .greeting { font-size: 1.25rem; color: #7ee787; }
      section { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #1b2440; }
      h2 { font-size: 1rem; text-transform: uppercase; letter-spacing: .05em; color: #8b93ab; }
      ul.todos { list-style: none; padding: 0; }
      ul.todos li { display: flex; align-items: center; gap: .6rem; padding: .4rem 0; }
      ul.todos li.done span { text-decoration: line-through; color: #6b7280; }
      ul.todos li span { flex: 1; }
      button.link { background: none; color: #ff7b72; padding: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
