# Quinoa: auto-provision Bun so no local install is needed.
# (The rest of the app config lives in application.yaml — both files are read.)
#
# These two keys can't be expressed in application.yaml:
# `quarkus.quinoa.package-manager-install` is BOTH the on/off flag (@WithParentName)
# AND the parent of `bun-version`, which a single YAML key cannot represent.
#
# Bun is downloaded once into `.quinoa/` (survives `gradle clean`) and reused.
quarkus.quinoa.package-manager-install=true
quarkus.quinoa.package-manager-install.bun-version=1.3.14
